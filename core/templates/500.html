<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Something went wrong</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#F4F6F8;color:#1c2733;margin:0;display:grid;place-items:center;min-height:100vh}
    .box{background:#fff;border:1px solid #e2e8ee;border-radius:14px;padding:40px 44px;max-width:480px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.05)}
    h1{font-size:22px;margin:0 0 8px;color:#15294D}
    p{color:#5a6675;line-height:1.55}
    a{display:inline-block;margin-top:14px;background:#15294D;color:#fff;text-decoration:none;padding:10px 20px;border-radius:9px;font-weight:600}
  </style>
</head>
<body>
  <div class="box">
    <h1>Something went wrong</h1>
    <p>Sorry, an unexpected error occurred. Please go back and try again. If it keeps happening, please note what you were doing and report it so it can be fixed.</p>
    <a href="/">Go to Dashboard</a>
  </div>
</body>
</html>
